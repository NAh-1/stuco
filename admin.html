<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIS Council Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="admin-style.css">
</head>
<body>

<div id="loginView" class="login-container">
  <div class="login-box">
    <h1>STUCO Admin</h1>
    <p>Sign in with your registered admin or teacher account.</p>
    <div id="loginError" class="error-msg"></div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@school.edu">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>
    <button class="btn-primary" onclick="handleLogin()">Sign In</button>
  </div>
</div>

<div id="adminView" class="admin-wrapper" style="display: none;">
  <aside class="sidebar">
    <div class="sidebar-logo">STUCO ADMIN</div>
    <ul class="sidebar-nav">
      <li><button class="nav-btn active" data-section="announcements">Announcements</button></li>
      <li><button class="nav-btn" data-section="events">Events</button></li>
      <li><button class="nav-btn" data-section="initiatives">Initiatives</button></li>
      <li><button class="nav-btn" data-section="contact">Contact Submissions</button></li>
      <li><button class="nav-btn" data-section="survey">Survey Responses</button></li>
      <li><button class="logout-btn" onclick="handleLogout()">Logout</button></li>
    </ul>
  </aside>

  <div class="main-content">

    <section class="content-section active" id="announcements">
      <div class="header">
        <h2>Announcements</h2>
        <button class="add-btn" onclick="openAddAnnouncement()">+ New Announcement</button>
      </div>
      <div id="announcementsList"></div>
    </section>

    <section class="content-section" id="events">
      <div class="header">
        <h2>Events</h2>
        <button class="add-btn" onclick="openAddEvent()">+ New Event</button>
      </div>
      <div id="eventsList"></div>
    </section>

    <section class="content-section" id="initiatives">
      <div class="header">
        <h2>Initiatives</h2>
        <button class="add-btn" onclick="openAddInitiative()">+ New Initiative</button>
      </div>
      <div id="initiativesList"></div>
    </section>

    <section class="content-section" id="contact">
      <div class="header">
        <h2>Contact Submissions</h2>
      </div>
      <div id="contactList"></div>
    </section>

    <section class="content-section" id="survey">
      <div class="header">
        <h2>Surveys</h2>
        <button class="add-btn" onclick="openSurveyBuilder()">+ Create Survey</button>
      </div>
      
      <div id="surveyManagement">
        <div class="card">
          <div class="card-content">
            <h3>Active Survey</h3>
            <p id="activeSurveyInfo">No active survey</p>
            <div id="surveyLinkContainer" style="margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(0,0,0,0.1); display: none;">
              <strong style="display: block; margin-bottom: 8px; color: var(--navy); font-size: 12px;">Share Survey Link:</strong>
              <div style="display: flex; gap: 8px;">
                <input type="text" id="surveyLinkInput" readonly style="flex: 1; padding: 12px 16px; border: 1.5px solid rgba(0,0,0,0.1); border-radius: 6px; font-size: 13px; background: #f9f9f9;">
                <button class="btn-sm btn-primary" onclick="copySurveyLink()" style="padding: 12px 20px;">Copy Link</button>
              </div>
            </div>
          </div>
          <div class="card-actions" id="activeSurveyActions"></div>
        </div>
      </div>

      <h3 style="margin-top: 32px; margin-bottom: 16px;">Survey Responses</h3>
      <div id="surveyList"></div>
    </section>

  </div>
</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modalTitle">Edit Item</h3>
      <button class="close-btn" onclick="closeModal()">&times;</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script src="config.js"></script>
<script src="admin-script.js"></script>

</body>
</html>
